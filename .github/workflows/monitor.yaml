name: VAULT

on:
  schedule:
    - cron: "0 8 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run VAULT
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          SWH_TOKEN: ${{ secrets.SWH_TOKEN }}
        run: uv run main.py --config ontologies.yaml

      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: update ontology report [$(date -u +'%Y-%m-%d')]"
          git push